apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: obs-promtail
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "15"
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: "6.*"
    helm:
      releaseName: promtail
      values: |
        config:
          clients:
            - url: http://loki.observability.svc.cluster.local:3100/loki/api/v1/push
              external_labels:
                cluster: freshcloud-mvp

        tolerations:
          - operator: Exists

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            memory: 512Mi

        serviceMonitor:
          enabled: true
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
